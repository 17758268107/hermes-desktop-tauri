# Tauri 2 desktop release pipeline
#
# Cross-platform matrix that builds signed Tauri installers for Windows
# (NSIS .exe + MSI), macOS (DMG, arm64 + x64 universal), and Linux (deb +
# AppImage). Bundled updater artifacts are uploaded to a "Tauri update
# artifacts" workflow artifact and the installable bundles are attached
# to the GitHub Release that triggered this workflow.
#
# Triggers:
#   * push of a tag matching v*.*.* (e.g. v2.4.0)
#   * manual run via workflow_dispatch
#
# Required secrets (configured in repository Settings → Secrets):
#   * TAURI_SIGNING_PRIVATE_KEY      — contents of src-tauri/keys/hws.key
#   * TAURI_SIGNING_PRIVATE_KEY_PASSWORD
#   * GITHUB_TOKEN                   — auto-provided by Actions; used to
#                                      upload release assets
#
# The matching public key (hws.key.pub) is committed to the repo and
# baked into tauri.conf.json — that's what end-user installs verify
# against.

name: Tauri Desktop Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 2.4.0). Leave blank to use the version in src-tauri/Cargo.toml.'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
            bundle_ext: dmg
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            args: --target x86_64-pc-windows-msvc
            bundle_ext: nsis
          - platform: ubuntu-22.04
            target: x86_64-unknown-linux-gnu
            args: --target x86_64-unknown-linux-gnu
            bundle_ext: deb,appimage

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
          cache-on-failure: true
          shared-key: ${{ matrix.target }}

      - name: Install Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.14

      - name: Install Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install frontend dependencies
        run: bun install --frozen-lockfile

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            file \
            wget

      - name: Import Tauri signing key
        shell: bash
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          if [ -z "$TAURI_SIGNING_PRIVATE_KEY" ]; then
            echo "::error::TAURI_SIGNING_PRIVATE_KEY secret is required for signed builds."
            exit 1
          fi
          mkdir -p src-tauri/keys
          printf '%s' "$TAURI_SIGNING_PRIVATE_KEY" > src-tauri/keys/hws.key
          echo "key imported (size=$(wc -c < src-tauri/keys/hws.key) bytes)"

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
          # Limit parallel rustc jobs to 2 on 7 GB GitHub-hosted runners
          # to avoid OOM during the link step of webkit/webkit2gtk/WebView2.
          CARGO_BUILD_JOBS: '2'
          RUSTFLAGS: '-C debuginfo=0 -C strip=symbols'
        with:
          projectPath: .
          tagName: ${{ github.ref_type == 'tag' && github.ref_name || format('v{0}', inputs.version) }}
          releaseName: 'Hermes Workspace ${{ github.ref_name }}'
          releaseBody: 'Hermes Workspace desktop release — Tauri 2 + Bun + Vite + TanStack Start. See CHANGELOG.md for details.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      - name: Upload Tauri updater artifacts
        uses: actions/upload-artifact@v4
        with:
          name: tauri-updater-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.tar.gz
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.deb
            src-tauri/target/${{ matrix.target }}/release/bundle/deb/*.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.AppImage
            src-tauri/target/${{ matrix.target }}/release/bundle/appimage/*.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.sig
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
          if-no-files-found: ignore
